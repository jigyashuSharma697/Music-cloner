<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatFlow Music</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-shell">
        <aside class="sidebar" aria-label="Music folders">
            <div class="brand">
                <span class="brand-mark">B</span>
                <div>
                    <h1>BeatFlow</h1>
                    <p>Copyright-safe music</p>
                </div>
            </div>

            <!-- Folder buttons are connected with JavaScript filters. -->
            <nav class="folder-list" id="folderList" aria-label="Playlist folders"></nav>
        </aside>

        <section class="main-stage">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Web Music Player</p>
                    <h2>Listen without copyright tension</h2>
                </div>
                <label class="search-box">
                    <span>Search</span>
                    <input id="searchInput" type="search" placeholder="Song, artist, mood">
                </label>
            </header>

            <section class="now-playing">
                <img id="coverImage" src="" alt="Current song cover">
                <div class="track-copy">
                    <p class="status-pill" id="folderName">All Music</p>
                    <h3 id="trackTitle">Select a song</h3>
                    <p id="trackArtist">Ready to play</p>
                    <p class="track-note" id="trackNote">
                        These demo tracks use royalty-free sample audio links.
                    </p>
                </div>
            </section>

            <section class="library-head">
                <div>
                    <p class="eyebrow">Library</p>
                    <h2 id="libraryTitle">All Songs</h2>
                </div>
                <p id="songCount">0 songs</p>
            </section>

            <!-- Song cards are rendered from js/app.js. -->
            <section class="song-grid" id="songGrid" aria-label="Song list"></section>
        </section>
    </main>

    <footer class="player-bar" aria-label="Audio player">
        <div class="mini-track">
            <img id="miniCover" src="" alt="">
            <div>
                <strong id="miniTitle">No song playing</strong>
                <span id="miniArtist">Choose from library</span>
            </div>
        </div>

        <div class="transport">
            <div class="buttons">
                <button id="prevBtn" type="button" title="Previous song">Prev</button>
                <button id="playBtn" class="primary-btn" type="button" title="Play or pause">Play</button>
                <button id="nextBtn" type="button" title="Next song">Next</button>
                <button id="stopBtn" type="button" title="Stop music">Stop</button>
            </div>
            <div class="timeline">
                <span id="currentTime">0:00</span>
                <input id="seekBar" type="range" min="0" max="100" value="0" aria-label="Seek song">
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="extras">
            <button id="likeBtn" type="button" title="Like or unlike">Like</button>
            <button id="muteBtn" type="button" title="Mute or unmute">Mute</button>
            <button id="loopBtn" type="button" title="Change loop mode">Loop: Off</button>
            <label class="volume">
                <span>Vol</span>
                <input id="volumeControl" type="range" min="0" max="1" value="0.75" step="0.01">
            </label>
        </div>
    </footer>

    <audio id="audioPlayer" preload="metadata"></audio>
    <script src="js/app.js"></script>
</body>
</html>
